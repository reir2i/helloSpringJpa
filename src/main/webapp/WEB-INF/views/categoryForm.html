<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>카테고리 등록</title>
    <style>
        body { font-family: 'Malgun Gothic', Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; color: #333; }
        h1 { border-bottom: 2px solid #4a90d9; padding-bottom: 10px; color: #2c3e50; }
        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 6px; font-weight: bold; }
        input[type=text] { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        .btn { display: inline-block; padding: 8px 16px; background: #4a90d9; color: white; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; }
        .btn-secondary { background: #6c757d; margin-left: 8px; }
        .error { color: #e74c3c; font-size: 0.9em; margin-top: 4px; }
    </style>
</head>
<body>
<h1>카테고리 등록</h1>

<form th:action="@{/categories/create}" th:object="${categoryForm}" method="post">
    <div class="form-group">
        <label for="name">카테고리 이름</label>
        <input type="text" id="name" th:field="*{name}" placeholder="카테고리 이름 입력"/>
        <div class="error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
    </div>
    <button type="submit" class="btn">등록</button>
    <a th:href="@{/categories}" class="btn btn-secondary">취소</a>
</form>

<footer style="margin-top: 40px; padding: 10px; border-top: 1px solid #ddd; color: #666; font-size: 0.9em;">
    <p th:text="${'실습 수행 일시: ' + #temporals.format(#temporals.createNow(), 'yyyy년 MM월 dd일 HH:mm:ss') + ' | 학번: 2371452 | 성명: 유영민'}"></p>
</footer>
</body>
</html>
